name: Update Trending Colors

on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-colors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytrends anthropic
      - run: python scripts/fetch-trending-colors.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/trending-colors.json
          git diff --cached --quiet || (git commit -m "chore: update trending colors" && git pull --rebase && git push)
